name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # CodeQL extractor is currently fragile on newer Kotlin toolchains.
    # Keep this non-blocking until extractor compatibility is consistently green.
    continue-on-error: true
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9da17a5aa4abec2340d6e6c8d8efb0770b1c9cb8 # v4.32.3
        with:
          languages: java-kotlin
          tools: latest

      - name: Build with Gradle
        id: gradle-build
        continue-on-error: true
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL Analysis
        if: steps.gradle-build.outcome == 'success'
        uses: github/codeql-action/analyze@9da17a5aa4abec2340d6e6c8d8efb0770b1c9cb8 # v4.32.3
        with:
          category: "/language:java-kotlin"
